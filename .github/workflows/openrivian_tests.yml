name: OpenRivian Tests & CI/CD
on:
  push:
    branches:
      - '**'

concurrency:
  group: build-dev
  cancel-in-progress: true

jobs:
  test_feature:
    name: Test Feature Branch
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/dev-test' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/dev-pre' && github.ref != 'refs/heads/clean'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run OpenRivian Daemon Tests
        run: |
          PYTHONPATH=. uv run coverage run --source=selfdrive/openrivian -m pytest selfdrive/openrivian/tests \
            --ignore=selfdrive/openrivian/tests/test_dependencies.py \
            --confcutdir=selfdrive/openrivian/tests -o addopts="" -p no:cacheprovider -v
      - name: Coverage report (informational)
        run: PYTHONPATH=. uv run coverage report -m || true

  build_dev_test:
    name: Rebuild dev-test & Integration Tests
    runs-on: ubuntu-latest
    needs: test_feature
    permissions:
      contents: write
    # Rebuild + test on every feature-branch push (excludes deploy/base branches and can-debug).
    if: success() && github.ref != 'refs/heads/can-decode' && github.ref != 'refs/heads/can-debug' && github.ref != 'refs/heads/dev-test' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/dev-pre' && github.ref != 'refs/heads/clean' && github.event_name == 'push'
    steps:
      - name: Checkout Clean
        uses: actions/checkout@v4
        with:
          ref: clean
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Rebuild dev-test locally
        run: |
          git checkout -B dev-test
          git fetch origin

          # List of active feature branches to merge into dev-test
          # EXPLICITLY EXCLUDES can-decode/can-debug to keep it standalone
          FEATURE_BRANCHES=("api" "web-dashboard" "mqtt")

          for branch in "${FEATURE_BRANCHES[@]}"; do
            echo "Merging origin/$branch into dev-test..."
            git merge "origin/$branch" --no-edit || { echo "Merge conflict with $branch"; exit 1; }
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Dependency Validation
        run: |
          PYTHONPATH=. uv run python3 selfdrive/openrivian/tests/test_dependencies.py

      - name: Run Extensive Integration Tests on dev-test
        run: |
          PYTHONPATH=. uv run coverage run --source=selfdrive/openrivian -m pytest selfdrive/openrivian/tests \
            --ignore=selfdrive/openrivian/tests/test_dependencies.py \
            --confcutdir=selfdrive/openrivian/tests -o addopts="" -p no:cacheprovider -v
      - name: Coverage report (informational)
        run: PYTHONPATH=. uv run coverage report -m || true

      - name: Push dev-test (integration branch, NOT deployed)
        run: |
          echo "Integration tests passed. Publishing dev-test (not yet deployed to dev)."
          git push origin dev-test --force

  promote_dev:
    name: Promote dev-test -> dev (manual approval)
    runs-on: ubuntu-latest
    needs: build_dev_test
    permissions:
      contents: write
    # Manual approval + email: the 'dev' environment has a required reviewer, so this
    # job pauses and notifies before anything reaches the dev branch the vehicle runs.
    environment: dev
    if: success() && github.ref != 'refs/heads/can-decode' && github.ref != 'refs/heads/can-debug' && github.ref != 'refs/heads/dev-test' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/dev-pre' && github.ref != 'refs/heads/clean' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Promote dev-test to dev
        run: |
          git fetch origin
          echo "Approved. Promoting dev-test to dev (Release Candidate)."
          git push origin origin/dev-test:dev --force

      - name: dev-pre guidance
        run: |
          # dev-pre is meant to be dev with C/C++ compiled and source/intermediary files
          # stripped (a fast-booting prebuilt). CI cannot produce that (no on-device arm64
          # toolchain), so dev-pre is NOT auto-updated here. Regenerate it on the device:
          #   ssh comma@<ip> 'cd /data/openpilot && selfdrive/ui/openrivian/scripts/build_prebuilt.sh'
          # then push the resulting prebuilt branch to origin/dev-pre.
          if git diff --name-only origin/dev origin/dev-test | grep -qE '\.(c|cc|cpp|h|hpp)$|SConscript'; then
            echo "::warning::Compiled files changed since last dev. dev-pre must be rebuilt on-device via build_prebuilt.sh."
          else
            echo "::notice::Only non-compiled changes. dev-pre may be fast-forwarded on-device, but is not auto-pushed by CI."
          fi
