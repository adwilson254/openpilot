name: OpenRivian Tests & CI/CD
on:
  push:
    branches:
      - '**'

concurrency:
  group: build-dev
  cancel-in-progress: true

jobs:
  test_feature:
    name: Test Feature Branch
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/dev-test' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/clean'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run OpenRivian Daemon Tests
        run: |
          PYTHONPATH=. uv run python -m pytest selfdrive/openrivian/tests \
            --ignore=selfdrive/openrivian/tests/test_dependencies.py \
            --confcutdir=selfdrive/openrivian/tests -o addopts="" -p no:cacheprovider -v

  build_and_deploy_dev:
    name: Rebuild dev-test & Deploy dev
    runs-on: ubuntu-latest
    needs: test_feature
    permissions:
      contents: write
    # Only run this pipeline when a feature branch (excluding can-decode/can-debug) is pushed
    if: success() && github.ref != 'refs/heads/can-decode' && github.ref != 'refs/heads/can-debug' && github.ref != 'refs/heads/dev-test' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/clean' && github.event_name == 'push'
    steps:
      - name: Checkout Clean
        uses: actions/checkout@v4
        with:
          ref: clean
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Rebuild dev-test locally
        run: |
          git checkout -B dev-test
          git fetch origin
          
          # List of active feature branches to merge into dev-test
          # EXPLICITLY EXCLUDES can-decode/can-debug to keep it standalone
          FEATURE_BRANCHES=("api" "web-dashboard" "mqtt")
          
          for branch in "${FEATURE_BRANCHES[@]}"; do
            echo "Merging origin/$branch into dev-test..."
            git merge "origin/$branch" --no-edit || { echo "Merge conflict with $branch"; exit 1; }
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run Dependency Validation
        run: |
          PYTHONPATH=. uv run python3 selfdrive/openrivian/tests/test_dependencies.py

      - name: Run Extensive Integration Tests on dev-test
        run: |
          PYTHONPATH=. uv run python -m pytest selfdrive/openrivian/tests \
            --ignore=selfdrive/openrivian/tests/test_dependencies.py \
            --confcutdir=selfdrive/openrivian/tests -o addopts="" -p no:cacheprovider -v

      - name: Push dev-test and fast-forward dev
        if: success()
        run: |
          echo "All tests passed on combined feature branches. Pushing dev-test."
          git push origin dev-test --force
          
          # Check what changed before promoting
          git fetch origin dev
          echo "Promoting dev-test to dev (Release Candidate)."
          git push origin dev-test:dev --force
          
          # Determine dev-pre strategy
          echo "Checking for compiled file changes..."
          if git diff --name-only origin/dev dev-test | grep -qE '\.(c|cc|cpp|h|hpp)$|SConscript'; then
            echo "::warning::Compiled files changed! Skipping dev-pre automatic push."
            echo "You MUST manually SSH into the Comma device and run selfdrive/ui/openrivian/scripts/build_prebuilt.sh to update dev-pre."
          else
            echo "Only Python changes detected. Automatically fast-forwarding dev-pre."
            git push origin dev-test:dev-pre --force
          fi
