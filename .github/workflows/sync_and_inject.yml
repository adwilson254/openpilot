name: Nightly Upstream Sync & Inject

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_and_inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout OpenRivian (clean branch)
        uses: actions/checkout@v4
        with:
          ref: clean
          fetch-depth: 0
          
      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/adventurepilotdev/ap-dev.git
          git fetch upstream ap-dev
          
      - name: Sync clean branch (fast-forward, else open PR)
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout clean
          if git merge upstream/ap-dev --ff-only; then
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::clean cannot fast-forward to upstream/ap-dev (upstream diverged). Opening a sync PR instead of silently skipping."
            BRANCH="sync/ap-dev-$(date +%Y%m%d)"
            git branch -f "$BRANCH" upstream/ap-dev
            git push -f origin "$BRANCH"
            gh pr create --base clean --head "$BRANCH" \
              --title "Nightly sync: ap-dev -> clean ($(date +%Y-%m-%d))" \
              --body "Automated fast-forward sync failed because upstream/ap-dev diverged from clean. Review and merge this PR to bring clean current. dev-test injection/push was skipped for this run." \
              || echo "A sync PR for this branch may already exist; leaving it in place."
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject into dev-test branch
        if: steps.sync.outputs.synced == 'true'
        run: |
          # Checkout dev-test
          git checkout dev-test || git checkout -b dev-test
          git merge clean -m "Merge clean into dev-test"
          
          # Run the Python injection script
          python3 selfdrive/ui/openrivian/scripts/inject.py
          
          # Add any injected changes and commit
          git add system/ui/spinner.py
          git diff --staged --quiet || git commit -m "[bot] Inject OpenRivian hooks"

      - name: Push branches
        if: steps.sync.outputs.synced == 'true'
        run: |
          git push origin clean
          git push origin dev-test
